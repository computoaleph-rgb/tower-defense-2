<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tower Defense Java-Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="ui">
        <h1>Java TD Engine</h1>
        <p>Click en el camino para poner torres | Oro: <span id="money">100</span></p>
    </div>

    <script>
        // --- CONFIGURACIÓN DEL JUEGO ---
        let enemies = [];
        let towers = [];
        let projectiles = [];
        let waypoints = [];
        let money = 100;
        let spawnTimer = 0;

        function setup() {
            createCanvas(800, 600);
            // Definir camino (Waypoints)
            waypoints = [
                {x: 0, y: 300},
                {x: 200, y: 300},
                {x: 200, y: 100},
                {x: 600, y: 100},
                {x: 600, y: 500},
                {x: 800, y: 500}
            ];
        }

        function draw() {
            background(30, 50, 30); // Fondo verde oscuro
            
            dibujarCamino();
            
            // Generar enemigos cada 2 segundos
            if (frameCount % 120 === 0) {
                enemies.push(new Enemy());
            }

            // Actualizar y dibujar torres
            for (let t of towers) {
                t.update();
                t.display();
            }

            // Actualizar y dibujar proyectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                projectiles[i].update();
                projectiles[i].display();
                if (projectiles[i].toRemove) projectiles.splice(i, 1);
            }

            // Actualizar y dibujar enemigos
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                enemies[i].display();
                if (enemies[i].life <= 0) {
                    money += 20;
                    document.getElementById('money').innerText = money;
                    enemies.splice(i, 1);
                }
            }
        }

        function dibujarCamino() {
            stroke(60);
            strokeWeight(40);
            noFill();
            beginShape();
            for (let p of waypoints) vertex(p.x, p.y);
            endShape();
        }

        // --- CLASES (Lógica Orientada a Objetos) ---

        class Enemy {
            constructor() {
                this.x = waypoints[0].x;
                this.y = waypoints[0].y;
                this.speed = 2;
                this.targetIdx = 1;
                this.life = 100;
            }

            update() {
                let target = waypoints[this.targetIdx];
                let angle = atan2(target.y - this.y, target.x - this.x);
                this.x += cos(angle) * this.speed;
                this.y += sin(angle) * this.speed;

                if (dist(this.x, this.y, target.x, target.y) < 5) {
                    this.targetIdx++;
                    if (this.targetIdx >= waypoints.length) this.life = 0; // Llego al final
                }
            }

            display() {
                fill(255, 50, 50);
                noStroke();
                ellipse(this.x, this.y, 20, 20);
                // Barra de vida
                fill(0, 255, 0);
                rect(this.x - 10, this.y - 20, this.life / 5, 5);
            }

            takeDamage(amt) { this.life -= amt; }
        }

        class Tower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.range = 150;
                this.cooldown = 0;
            }

            update() {
                if (this.cooldown > 0) this.cooldown--;
                
                for (let e of enemies) {
                    if (dist(this.x, this.y, e.x, e.y) < this.range && this.cooldown === 0) {
                        projectiles.push(new Projectile(this.x, this.y, e));
                        this.cooldown = 30; // Cadencia de disparo
                        break;
                    }
                }
            }

            display() {
                fill(100, 100, 255);
                rectMode(CENTER);
                rect(this.x, this.y, 30, 30);
                noFill();
                stroke(255, 50);
                strokeWeight(1);
                ellipse(this.x, this.y, this.range * 2);
            }
        }

        class Projectile {
            constructor(x, y, target) {
                this.x = x;
                this.y = y;
                this.target = target;
                this.speed = 7;
                this.toRemove = false;
            }

            update() {
                let angle = atan2(this.target.y - this.y, this.target.x - this.x);
                this.x += cos(angle) * this.speed;
                this.y += sin(angle) * this.speed;

                if (dist(this.x, this.y, this.target.x, this.target.y) < 10) {
                    this.target.takeDamage(25);
                    this.toRemove = true;
                }
            }

            display() {
                fill(255, 255, 0);
                ellipse(this.x, this.y, 8, 8);
            }
        }

        // Construir torres al hacer click
        function mousePressed() {
            if (money >= 50) {
                towers.push(new Tower(mouseX, mouseY));
                money -= 50;
                document.getElementById('money').innerText = money;
            }
        }
    </script>
</body>
</html>
